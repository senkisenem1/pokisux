<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategy Tool</title>
    <style>
        :root { --primary-dark: #2c3e50; --bg-color: #f1f5f9; --column-bg: #ffffff; --border-color: #e2e8f0; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; padding: 4px; background-color: var(--bg-color); margin: 0; overflow-x: hidden; }
        #password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .pw-box { padding: 12px; font-size: 16px; border-radius: 8px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
        .pw-btn { padding: 10px 20px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; }
        #main-content { display: none; width: 100vw; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 100%; }
        .stack-column { background: var(--column-bg); padding: 6px; border-radius: 6px; min-height: 98vh; border: 1px solid var(--border-color); }
        h1 { font-size: 0.8rem; color: #fff; background: var(--primary-dark); padding: 8px 2px; border-radius: 4px; text-align: center; margin: 0 0 8px 0; }
        h2 { font-size: 0.6rem; color: #64748b; margin: 10px 0 4px 0; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .button-group { display: flex; flex-direction: column; gap: 3px; }
        button.chart-trigger { padding: 8px 2px; background: #fff; border: 1px solid var(--border-color); border-radius: 4px; font-size: 9px; font-weight: 600; text-align: center; }
        button.active-btn { border-color: var(--success); background: #f0fff4; color: var(--success); }
        .hidden-chart { display: none; max-width: 100%; height: auto; border: 1px solid var(--primary-dark); border-radius: 4px; margin: 4px 0; }
    </style>
</head>

        <h2>Unlock</h2>
        <input type="password" id="pw-input" class="pw-box">
        <button onclick="checkPassword()" class="pw-btn">Go</button>

    <script>
        function checkPassword() {
            if (document.getElementById('pw-input').value === 'spinsux') {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert('Wrong password'); }
        }
        function toggle(id, btn) {
            const chart = document.getElementById(id);
            const column = chart.closest('.stack-column');
            const isVisible = (chart.style.display === "block");
            column.querySelectorAll('.hidden-chart').forEach(img => img.style.display = 'none');
            column.querySelectorAll('.chart-trigger').forEach(b => b.classList.remove('active-btn'));
            if (!isVisible) {
                chart.style.display = "block";
                btn.classList.add('active-btn');
            }
        }
    </script>
