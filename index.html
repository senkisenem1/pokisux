<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategy Tool v3</title>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --success: #22c55e; }
        body { font-family: -apple-system, sans-serif; padding: 5px; background: var(--bg); margin: 0; overflow-x: hidden; }
        #password-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .pw-box { padding: 15px; font-size: 18px; border-radius: 10px; border: none; margin-bottom: 15px; width: 240px; text-align: center; }
        .pw-btn { padding: 12px 30px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; }
        #main-content { display: none; width: 100%; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
        .stack-column { background: #fff; padding: 8px 4px; border-radius: 8px; min-height: 98vh; border: 1px solid #e2e8f0; }
        h1 { font-size: 1rem; color: #fff; background: var(--primary); padding: 10px 0; border-radius: 6px; text-align: center; margin: 0 0 10px 0; }
        h2 { font-size: 0.7rem; color: #94a3b8; margin: 12px 0 4px 0; text-transform: uppercase; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .group { display: flex; flex-direction: column; gap: 4px; }
        button { padding: 12px 2px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; font-weight: 700; color: var(--primary); cursor: pointer; }
        button.active-btn { background: var(--accent); color: white; border-color: var(--accent); }
        img { display: none; max-width: 100%; height: auto; border: 2px solid var(--accent); border-radius: 4px; margin: 5px 0; }
    </style>
</head>
<body>
    <div id="password-overlay">
        <input type="password" id="pw-input" class="pw-box" placeholder="Password">
        <button onclick="check()" class="pw-btn">Unlock</button>
    </div>

                    <button onclick="t('15sl3',this)">LIMP VS BB 3X</button><img id="15sl3" src="15BB/SB/sb_limp_vs_bb_3x_iso.png">
                    <button onclick="t('15sla',this)">LIMP VS BB AI</button><img id="15sla" src="15BB/SB/sb_limp_vs_bb_allin.png">
                </div>
                <h2>BB</h2>

                    <button onclick="t('15bsl',this)">VS SB LIMP</button><img id="15bsl" src="15BB/BB/bb_vs_sb_limp.png">
                    <button onclick="t('15bs25',this)">VS SB 2.5X</button><img id="15bs25" src="15BB/BB/bb_vs_sb_2.5x.png">

    </div>

    <script>
        function check(){ if(document.getElementById('pw-input').value==='spinsux'){ document.getElementById('password-overlay').style.display='none'; document.getElementById('main-content').style.display='block'; } }
        function t(id,btn){
            const img=document.getElementById(id); const col=img.closest('.stack-column'); const vis=img.style.display==='block';
            col.querySelectorAll('img').forEach(i=>i.style.display='none');
            col.querySelectorAll('button').forEach(b=>b.classList.remove('active-btn'));
            if(!vis){ img.style.display='block'; btn.classList.add('active-btn'); }
        }
    </script>
</body>
</html>
