<!DOCTYPE html>

    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #020617; --text: #f8fafc; --btn-bg: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 5px; overflow: hidden; }
        
        /* Grid Layout */
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100vw; height: 100vh; box-sizing: border-box; }
        .stack-column { background: #111827; border-radius: 12px; padding: 10px 5px; display: flex; flex-direction: column; border: 1px solid #374151; }
        
        /* Headers */
        h1 { font-size: 1.2rem; text-align: center; margin: 0 0 10px 0; background: var(--accent); padding: 8px; border-radius: 8px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        h2 { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 5px 0; text-align: center; border-bottom: 1px solid #334155; }
        
        /* Buttons */
        .group { display: flex; flex-direction: column; gap: 4px; }
        button { 
            padding: 14px 4px; 
            background: var(--btn-bg); 
            border: 1px solid #334155; 
            border-radius: 6px; 
            color: #cbd5e1; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button.active { background: var(--accent); color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        
        /* Images */
        .img-container { min-height: 0; flex-grow: 0; }
        img { display: none; width: 100%; border-radius: 4px; margin-top: 8px; border: 2px solid var(--accent); }
        
        /* Password Overlay */
        #pw-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .pw-input { padding: 15px; border-radius: 8px; border: none; margin-bottom: 15px; width: 200px; font-size: 18px; text-align: center; }
    </style>
</head>

    <script>
        // Make sure this matches exactly what you type
        const MASTER_PASSWORD = "spinsux"; 

        function unlock() {
            const input = document.getElementById('pw');
            const overlay = document.getElementById('pw-overlay');
            const app = document.getElementById('app');

            if (input.value.trim() === MASTER_PASSWORD) {
                overlay.style.display = 'none';
                app.style.display = 'grid';
                // Force a redraw for iPad Safari
                window.dispatchEvent(new Event('resize'));
            } else {
                input.style.border = "2px solid #ef4444";
                input.value = "";
                input.placeholder = "WRONG CODE";
            }
        }

        // Allow pressing "Enter" on the keyboard to unlock
        document.getElementById('pw').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                unlock();
            }
        });

        function sh(id, btn) {
            const col = btn.closest('.stack-column');
            const images = col.querySelectorAll('img');
            const buttons = col.querySelectorAll('button');
            const target = document.getElementById(id);
            
            const isOpening = target.style.display !== 'block';

            // Reset current column
            images.forEach(img => img.style.display = 'none');
            buttons.forEach(b => b.classList.remove('active'));

            if (isOpening) {
                target.style.display = 'block';
                btn.classList.add('active');
            }
        }
    </script>
