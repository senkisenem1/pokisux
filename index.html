<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategy Tool</title>
    <style>
        :root { --primary-dark: #2c3e50; --bg-color: #eef1f4; --column-bg: #ffffff; --border-color: #d1d5db; --success: #27ae60; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 10px; background-color: var(--bg-color); margin: 0; -webkit-tap-highlight-color: transparent; }
        #password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .pw-box { padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 10px; width: 80%; max-width: 300px; text-align: center; }
        .pw-btn { padding: 12px 25px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-content { display: none; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: start; }
        @media (max-width: 1200px) { .main-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
        .stack-column { background: var(--column-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 90vh; }
        h1 { font-size: 1.1rem; color: #fff; background: var(--primary-dark); padding: 12px; border-radius: 8px; text-align: center; position: sticky; top: 0; z-index: 10; margin: 0 0 15px 0; }
        h2 { font-size: 0.8rem; color: #94a3b8; margin-top: 15px; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .button-group { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
        button.chart-trigger { padding: 12px 10px; background: #fff; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; text-align: left; }
        .hidden-chart { display: none; max-width: 100%; height: auto; border: 2px solid var(--primary-dark); border-radius: 6px; margin: 8px 0; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

    <div id="password-overlay">
        <h2>Enter Password</h2>
        <input type="password" id="pw-input" class="pw-box" placeholder="...">
        <button onclick="checkPassword()" class="pw-btn">Unlock</button>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('pw-input').value === 'spinsux') {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert('Wrong password'); }
        }
        function toggle(id) {
            const chart = document.getElementById(id);
            const column = chart.closest('.stack-column');
            const isVisible = chart.style.display === "block";
            // Hide all images in the column before showing the new one
            column.querySelectorAll('.hidden-chart').forEach(img => img.style.display = 'none');
            if (!isVisible) chart.style.display = "block";
        }
    </script>
